* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
}
#app {
  display: flex;
  gap: 24px;
  align-items: flex-start;
}
#board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
  width: 480px;
  height: 480px;
  border: 3px solid #444;
  border-radius: 4px;
  overflow: hidden;
}
#board .sq {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
  cursor: pointer;
  user-select: none;
  position: relative;
  transition: background-color 0.1s;
}
/* Square colors — pure CSS checkerboard via :nth-child */
#board .sq { background: #b58863; }
#board .sq:nth-child(16n+1), #board .sq:nth-child(16n+3),
#board .sq:nth-child(16n+5), #board .sq:nth-child(16n+7),
#board .sq:nth-child(16n+10), #board .sq:nth-child(16n+12),
#board .sq:nth-child(16n+14), #board .sq:nth-child(16n+16) {
  background: #f0d9b5;
}
/* Piece symbols — CSS content driven by data-p attribute */
[data-p="wK"]::before { content: '\2654'; }
[data-p="wQ"]::before { content: '\2655'; }
[data-p="wR"]::before { content: '\2656'; }
[data-p="wB"]::before { content: '\2657'; }
[data-p="wN"]::before { content: '\2658'; }
[data-p="wP"]::before { content: '\2659'; }
[data-p="bK"]::before { content: '\265A'; }
[data-p="bQ"]::before { content: '\265B'; }
[data-p="bR"]::before { content: '\265C'; }
[data-p="bB"]::before { content: '\265D'; }
[data-p="bN"]::before { content: '\265E'; }
[data-p="bP"]::before { content: '\265F'; }
/* White pieces: white fill, dark outline */
.sq[data-p^="w"]::before {
  color: #fff;
  text-shadow:
    -1px -1px 0 #333, 1px -1px 0 #333,
    -1px  1px 0 #333, 1px  1px 0 #333,
     0   -1px 0 #333, 0    1px 0 #333,
    -1px  0   0 #333, 1px  0   0 #333;
}
/* Black pieces: dark fill, light outline */
.sq[data-p^="b"]::before {
  color: #1a1a1a;
  text-shadow:
    -1px -1px 0 rgba(255,255,255,0.6), 1px -1px 0 rgba(255,255,255,0.6),
    -1px  1px 0 rgba(255,255,255,0.6), 1px  1px 0 rgba(255,255,255,0.6),
     0   -1px 0 rgba(255,255,255,0.6), 0    1px 0 rgba(255,255,255,0.6),
    -1px  0   0 rgba(255,255,255,0.6), 1px  0   0 rgba(255,255,255,0.6);
}
/* Turn-aware cursors */
#game[data-t="w"] .sq[data-p^="w"] { cursor: pointer; }
#game[data-t="w"] .sq:not([data-p^="w"]) { cursor: default; }
/* Highlights */
/* Board wrap for overlay stacking */
#board-wrap { position: relative; }
/* UI Overlay — outside #game, no CSS recalc */
#ui-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 480px; height: 480px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
  pointer-events: none;
  z-index: 10;
  border: 3px solid transparent;
  border-radius: 4px;
}
#ui-overlay .ov { position: relative; }
#ui-overlay .ov.selected { background: rgba(246, 246, 105, 0.6); }

#ui-overlay .ov.dot::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 26%; height: 26%;
  transform: translate(-50%, -50%);
  background: rgba(0, 0, 0, 0.15);
  border-radius: 50%;
}
#ui-overlay .ov.ring::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 90%; height: 90%;
  transform: translate(-50%, -50%);
  background: transparent;
  border: 5px solid rgba(0, 0, 0, 0.15);
  border-radius: 50%;
}
/* Check highlight — driven directly by CSS custom properties from check-detection.css */
#board .sq[data-p="wK"] { box-shadow: inset 0 0 calc(var(--wk-in-check, 0) * 20px) #ff6b6b; }
#board .sq[data-p="bK"] { box-shadow: inset 0 0 calc(var(--bk-in-check, 0) * 20px) #ff6b6b; }
#board .sq:hover:not(.selected) {
  filter: brightness(1.1);
}
/* Candidates at viewport origin for elementFromPoint(0,0) z-index argmax */
#candidates {
  position: fixed;
  top: 0;
  left: 0;
  width: 1px;
  height: 1px;
  overflow: hidden;
  z-index: 999999;
}
/* Info panel */
#info-panel {
  width: 240px;
  background: #16213e;
  border-radius: 8px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
#info-panel h2 {
  font-size: 18px;
  color: #e94560;
  text-align: center;
}
#status {
  padding: 10px;
  background: #0f3460;
  border-radius: 6px;
  text-align: center;
  font-weight: bold;
  min-height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#move-list {
  flex: 1;
  max-height: 340px;
  overflow-y: auto;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.6;
  padding: 8px;
  background: #0a0a1a;
  border-radius: 6px;
}
.move-pair {
  display: flex;
  gap: 8px;
}
.move-number { color: #666; min-width: 28px; text-align: right; }
.move-san { min-width: 60px; }
.move-san.white { color: #ddd; }
.move-san.black { color: #aaa; }
#new-game {
  padding: 10px;
  background: #e94560;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.2s;
}
#new-game:hover { background: #c73550; }
/* Status text — pure CSS driven by data-t and data-result on #game */
#app:has(#game:not([data-result])[data-t="w"]) #status::before { content: "Your turn (White)"; }
#app:has(#game:not([data-result])[data-t="b"]) #status::before { content: "Engine thinking..."; }
#app:has(#game[data-result="w-wins"]) #status::before { content: "Checkmate! White wins!"; }
#app:has(#game[data-result="b-wins"]) #status::before { content: "Checkmate! Black wins!"; }
#app:has(#game[data-result="draw"]) #status::before { content: "Stalemate! Draw."; }
/* Thinking spinner — shown when engine is thinking (black's turn, game not over) */
#app:has(#game:not([data-result])[data-t="b"]) #status::after {
  content: '';
  display: inline-block;
  width: 12px;
  height: 12px;
  border: 2px solid #e94560;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-left: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* Promotion dialog */
#promo-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  justify-content: center;
  align-items: center;
}
#promo-overlay.active { display: flex; }
#promo-dialog {
  background: #16213e;
  border-radius: 12px;
  padding: 16px;
  display: flex;
  gap: 8px;
}
#promo-dialog .promo-choice {
  font-size: 48px;
  width: 64px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f0d9b5;
  border-radius: 8px;
  cursor: pointer;
  border: 3px solid transparent;
  transition: border-color 0.1s, transform 0.1s;
}
#promo-dialog .promo-choice:hover {
  border-color: #e94560;
  transform: scale(1.1);
}

<script>
'use strict';

// ── Cached DOM references ──
const game = document.getElementById('game');
const board = document.getElementById('board');
const sqElements = new Map();
for (const el of board.querySelectorAll('.sq')) sqElements.set(el.dataset.s, el);
const candidateEls = document.querySelectorAll('#candidates .move');

// ── Build overlay cells (outside #game — no CSS recalc) ──
const ovElements = new Map();
const uiOverlay = document.getElementById('ui-overlay');
const ranks = ['8','7','6','5','4','3','2','1'];
const fileLetters = ['a','b','c','d','e','f','g','h'];
for (const r of ranks) {
  for (const f of fileLetters) {
    const div = document.createElement('div');
    div.className = 'ov';
    div.dataset.s = f + r;
    uiOverlay.appendChild(div);
    ovElements.set(f + r, div);
  }
}

// ── UI State ──
let selectedSquare = null;
let currentLegalMoves = [];
let moveHistory = [];
let gameOver = false;

// ── resetBoard(fen) ── Parse FEN → set DOM attributes directly
function resetBoard(fen) {
  const files = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];
  const parts = fen.split(' ');
  const rows = parts[0].split('/');

  for (let rankIdx = 0; rankIdx < 8; rankIdx++) {
    const rank = 8 - rankIdx;
    let fileIdx = 0;
    for (const ch of rows[rankIdx]) {
      if (ch >= '1' && ch <= '8') {
        for (let i = 0; i < parseInt(ch); i++) {
          sqElements.get(files[fileIdx] + rank).dataset.p = 'empty';
          fileIdx++;
        }
      } else {
        const color = ch === ch.toUpperCase() ? 'w' : 'b';
        sqElements.get(files[fileIdx] + rank).dataset.p = color + ch.toUpperCase();
        fileIdx++;
      }
    }
  }

  game.dataset.t = parts[1] || 'w';
  const castling = parts[2] || '-';
  game.setAttribute('data-cwk', castling.includes('K') ? '1' : '0');
  game.setAttribute('data-cwq', castling.includes('Q') ? '1' : '0');
  game.setAttribute('data-cbk', castling.includes('k') ? '1' : '0');
  game.setAttribute('data-cbq', castling.includes('q') ? '1' : '0');
  game.dataset.e = (parts[3] && parts[3] !== '-') ? parts[3] : 'none';

  // Clear last-move tracking (for reversal penalty + CSS overlay highlight)
  game.removeAttribute('data-lfw');
  game.removeAttribute('data-ltw');
  game.removeAttribute('data-lfb');
  game.removeAttribute('data-ltb');
  game.removeAttribute('data-lf');
  game.removeAttribute('data-lt');
}

// ── applyMove(move) ── Directly mutate DOM attributes
function applyMove(move) {
  const fromEl = sqElements.get(move.from);
  const toEl = sqElements.get(move.to);
  const movingPiece = fromEl.dataset.p;
  const pieceType = movingPiece[1];
  const color = movingPiece[0];

  // En passant capture
  if (move.ep) {
    sqElements.get(move.to[0] + move.from[1]).dataset.p = 'empty';
  }

  // Castling rook
  if (move.castle) {
    let rookFrom, rookTo;
    if (move.castle === 'wk') { rookFrom = 'h1'; rookTo = 'f1'; }
    else if (move.castle === 'wq') { rookFrom = 'a1'; rookTo = 'd1'; }
    else if (move.castle === 'bk') { rookFrom = 'h8'; rookTo = 'f8'; }
    else if (move.castle === 'bq') { rookFrom = 'a8'; rookTo = 'd8'; }
    sqElements.get(rookTo).dataset.p = sqElements.get(rookFrom).dataset.p;
    sqElements.get(rookFrom).dataset.p = 'empty';
  }

  // Move piece (with promotion)
  toEl.dataset.p = move.promotion ? color + move.promotion.toUpperCase() : movingPiece;
  fromEl.dataset.p = 'empty';

  // Update castling rights
  if (pieceType === 'K') {
    if (color === 'w') { game.setAttribute('data-cwk', '0'); game.setAttribute('data-cwq', '0'); }
    else { game.setAttribute('data-cbk', '0'); game.setAttribute('data-cbq', '0'); }
  }
  if (pieceType === 'R') {
    if (move.from === 'a1') game.setAttribute('data-cwq', '0');
    if (move.from === 'h1') game.setAttribute('data-cwk', '0');
    if (move.from === 'a8') game.setAttribute('data-cbq', '0');
    if (move.from === 'h8') game.setAttribute('data-cbk', '0');
  }
  if (move.to === 'a1') game.setAttribute('data-cwq', '0');
  if (move.to === 'h1') game.setAttribute('data-cwk', '0');
  if (move.to === 'a8') game.setAttribute('data-cbq', '0');
  if (move.to === 'h8') game.setAttribute('data-cbk', '0');

  // En passant square
  if (pieceType === 'P' && Math.abs(parseInt(move.to[1]) - parseInt(move.from[1])) === 2) {
    game.dataset.e = move.from[0] + (color === 'w' ? '3' : '6');
  } else {
    game.dataset.e = 'none';
  }

  // Record this side's last move (for reversal penalty)
  game.setAttribute('data-lf' + color, move.from);
  game.setAttribute('data-lt' + color, move.to);

  // Generic last-move attributes (drives CSS overlay highlight)
  game.setAttribute('data-lf', move.from);
  game.setAttribute('data-lt', move.to);

  // Switch turn
  game.dataset.t = color === 'w' ? 'b' : 'w';

}

// ── getLegalMoves() ── Read CSS computed styles, no arguments needed
function getLegalMoves() {
  game.offsetHeight; // force style recalc

  const moves = [];
  const turn = game.dataset.t;

  for (const el of candidateEls) {
    const style = getComputedStyle(el);
    if (style.getPropertyValue('--pseudo-legal').trim() !== '1') continue;
    if (style.getPropertyValue('--illegal').trim() === '1') continue;

    const from = el.dataset.f;
    const to = el.dataset.d;
    const fromEl = sqElements.get(from);
    const toEl = sqElements.get(to);

    const move = { from, to };
    if (el.dataset.pr) move.promotion = el.dataset.pr;
    if (el.dataset.c) move.castle = el.dataset.c;
    if (el.dataset.e === 'true') move.ep = true;

    move.score = parseInt(style.order, 10) || 0;
    move.piece = fromEl.dataset.p;
    move.pieceType = move.piece[1].toLowerCase();
    const toPiece = toEl.dataset.p;
    if (toPiece !== 'empty') {
      move.captured = toPiece;
      move.capturedType = toPiece[1].toLowerCase();
    }
    if (move.ep) {
      move.captured = (turn === 'w' ? 'bP' : 'wP');
      move.capturedType = 'p';
    }
    moves.push(move);
  }
  return moves;
}

// ── isInCheck() ── Read CSS custom property from #board
function isInCheck() {
  game.offsetHeight; // force style recalc
  const checkVar = game.dataset.t === 'w' ? '--wk-in-check' : '--bk-in-check';
  return getComputedStyle(board).getPropertyValue(checkVar).trim() === '1';
}

// ── toSan(move, legalMoves) ── Pure notation conversion, no +/# suffixes
function toSan(move, legalMoves) {
  if (move.castle === 'wk' || move.castle === 'bk') return 'O-O';
  if (move.castle === 'wq' || move.castle === 'bq') return 'O-O-O';

  const pieceType = move.piece[1];
  let san = '';

  if (pieceType === 'P') {
    if (move.captured) san += move.from[0] + 'x';
    san += move.to;
    if (move.promotion) san += '=' + move.promotion.toUpperCase();
  } else {
    san += pieceType;
    // Disambiguation
    const ambiguous = legalMoves.filter(m =>
      m.piece === move.piece && m.to === move.to && m.from !== move.from && !m.promotion
    );
    if (ambiguous.length > 0) {
      const sameFile = ambiguous.some(m => m.from[0] === move.from[0]);
      const sameRank = ambiguous.some(m => m.from[1] === move.from[1]);
      if (!sameFile) san += move.from[0];
      else if (!sameRank) san += move.from[1];
      else san += move.from;
    }
    if (move.captured) san += 'x';
    san += move.to;
  }

  return san;
}

// ── init() ──
function init() {
  selectedSquare = null;
  currentLegalMoves = [];
  moveHistory = [];
  gameOver = false;

  resetBoard('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1');
  game.removeAttribute('data-result');

  document.getElementById('move-list').innerHTML = '';
}

// ── onBoardClick(e) ──
function onBoardClick(e) {
  if (gameOver || game.dataset.t !== 'w') return;

  const sqEl = e.target.closest('.sq');
  if (!sqEl) return;
  const sq = sqEl.dataset.s;
  const piece = sqEl.dataset.p;

  if (selectedSquare) {
    const move = currentLegalMoves.find(m => m.from === selectedSquare && m.to === sq);
    if (move) {
      if (move.pieceType === 'p' && (sq[1] === '8' || sq[1] === '1')) {
        showPromotionDialog(sq, selectedSquare);
        return;
      }
      playMove(move);
      return;
    }
    if (piece !== 'empty' && piece[0] === game.dataset.t) {
      selectSquare(sq);
      return;
    }
    clearSelection();
    return;
  }

  if (piece !== 'empty' && piece[0] === game.dataset.t) {
    selectSquare(sq);
  }
}

// ── selectSquare(sq) ──
function selectSquare(sq) {
  clearSelection();
  selectedSquare = sq;

  currentLegalMoves = getLegalMoves();

  // All visual feedback on overlay (outside #game — instant, no CSS recalc)
  ovElements.get(sq).classList.add('selected');
  const seen = new Set();
  for (const move of currentLegalMoves) {
    if (move.from !== sq || seen.has(move.to)) continue;
    seen.add(move.to);
    ovElements.get(move.to).classList.add(move.captured ? 'ring' : 'dot');
  }
}

// ── clearSelection() ──
function clearSelection() {
  selectedSquare = null;
  for (const el of ovElements.values()) {
    el.classList.remove('selected', 'dot', 'ring');
  }
}

// ── showPromotionDialog(toSq, fromSq) ──
function showPromotionDialog(toSq, fromSq) {
  const overlay = document.getElementById('promo-overlay');
  const dialog = document.getElementById('promo-dialog');
  const color = game.dataset.t;
  const pieces = ['Q', 'R', 'B', 'N'];

  dialog.innerHTML = '';
  for (const p of pieces) {
    const btn = document.createElement('div');
    btn.className = 'promo-choice';
    btn.setAttribute('data-p', color + p);
    btn.addEventListener('click', () => {
      overlay.classList.remove('active');
      const move = currentLegalMoves.find(m =>
        m.from === fromSq && m.to === toSq && m.promotion === p.toLowerCase()
      );
      if (move) playMove(move);
    });
    dialog.appendChild(btn);
  }
  overlay.classList.add('active');
}

// ── playMove(move) ──
function playMove(move) {
  clearSelection();

  const san = toSan(move, currentLegalMoves);

  applyMove(move);

  moveHistory.push({ san, from: move.from, to: move.to });

  updateMoveList();

  if (checkGameEnd()) return;

  setTimeout(() => engineMove(), 50);
}

// ── engineMove() ──
function engineMove() {
  if (gameOver) return;

  const moves = getLegalMoves();
  if (moves.length === 0) {
    checkGameEnd();
    return;
  }

  // CSS z-index argmax: elementFromPoint returns the highest-scored legal move
  const el = document.elementFromPoint(0, 0);
  const bf = el?.dataset.f;
  const bt = el?.dataset.d;
  const bp = el?.dataset.pr || '';
  const bestMove = moves.find(m => m.from === bf && m.to === bt && (m.promotion || '') === bp) || moves[0];

  const san = toSan(bestMove, moves);

  applyMove(bestMove);

  moveHistory.push({ san, from: bestMove.from, to: bestMove.to });

  updateMoveList();

  if (checkGameEnd()) return;
}

// ── checkGameEnd() ──
function checkGameEnd() {
  const moves = getLegalMoves();
  if (moves.length > 0) return false;

  gameOver = true;
  if (isInCheck()) {
    const winner = game.dataset.t === 'w' ? 'b-wins' : 'w-wins';
    game.setAttribute('data-result', winner);
  } else {
    game.setAttribute('data-result', 'draw');
  }
  return true;
}

// ── updateMoveList() ──
function updateMoveList() {
  const container = document.getElementById('move-list');
  container.innerHTML = '';
  for (let i = 0; i < moveHistory.length; i += 2) {
    const moveNum = Math.floor(i / 2) + 1;
    const div = document.createElement('div');
    div.className = 'move-pair';
    div.innerHTML = '<span class="move-number">' + moveNum + '.</span>'
      + '<span class="move-san white">' + moveHistory[i].san + '</span>'
      + (moveHistory[i + 1] ? '<span class="move-san black">' + moveHistory[i + 1].san + '</span>' : '');
    container.appendChild(div);
  }
  container.scrollTop = container.scrollHeight;
}

// ── Benchmark: does data-sel on #game trigger full :has() recalc? ──
// Run from console: benchmarkDataSel()
// Each iteration forces style recalc (~seconds), so runs async with progress.
window.benchmarkDataSel = async function(iterations = 5) {
  const squares = ['e2','d2','e4','d7','g1','b8','f3','c6'];
  const results = { dataSel: [], dataT: [], baseline: [] };

  const measure = (label, fn) => new Promise(resolve => {
    requestAnimationFrame(() => {
      const t0 = performance.now();
      fn();
      game.offsetHeight; // force recalc
      const dt = performance.now() - t0;
      resolve(dt);
    });
  });

  for (let i = 0; i < iterations; i++) {
    console.log('Iteration ' + (i + 1) + '/' + iterations + '...');

    // Measure data-sel (novel attribute, no engine CSS references it)
    const dtSel = await measure('data-sel', () => {
      game.setAttribute('data-sel', squares[i % squares.length]);
    });
    results.dataSel.push(dtSel);
    game.removeAttribute('data-sel');
    game.offsetHeight;

    // Yield to UI between heavy measurements
    await new Promise(r => setTimeout(r, 50));

    // Measure data-t flip (known to trigger full engine recalc)
    const origT = game.dataset.t;
    const dtT = await measure('data-t', () => {
      game.dataset.t = origT === 'w' ? 'b' : 'w';
    });
    results.dataT.push(dtT);
    game.dataset.t = origT;
    game.offsetHeight;

    await new Promise(r => setTimeout(r, 50));

    // Measure baseline (read without mutation)
    const dtBase = await measure('baseline', () => { /* no mutation */ });
    results.baseline.push(dtBase);

    console.log('  data-sel: ' + dtSel.toFixed(1) + 'ms  data-t: ' + dtT.toFixed(1) + 'ms  baseline: ' + dtBase.toFixed(1) + 'ms');
  }

  const avg = arr => (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(2);
  const med = arr => { const s = [...arr].sort((a,b) => a - b); return s[Math.floor(s.length/2)].toFixed(2); };

  console.log('\n=== Results (' + iterations + ' iterations) ===');
  console.table({
    'data-sel (novel attr)': { avg: avg(results.dataSel) + 'ms', median: med(results.dataSel) + 'ms' },
    'data-t (engine attr)':  { avg: avg(results.dataT)   + 'ms', median: med(results.dataT)   + 'ms' },
    'baseline (no mutation)':{ avg: avg(results.baseline) + 'ms', median: med(results.baseline) + 'ms' },
  });

  const ratio = (avg(results.dataSel) / avg(results.dataT) * 100).toFixed(1);
  console.log('\ndata-sel is ' + ratio + '% of data-t cost. ' +
    (ratio < 20 ? 'Chrome skips engine recalc — CSS dots/rings are feasible!' :
     ratio < 80 ? 'Partial recalc — might be usable with care.' :
     'Full recalc — CSS dots/rings would be as expensive as engine eval.'));

  return results;
};

// ── Init ──
board.addEventListener('click', onBoardClick);
document.getElementById('new-game').addEventListener('click', init);
init();
</script>
