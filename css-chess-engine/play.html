<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
}
#app {
  display: flex;
  gap: 24px;
  align-items: flex-start;
}
#board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
  width: 480px;
  height: 480px;
  border: 3px solid #444;
  border-radius: 4px;
  overflow: hidden;
}
#board .sq {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
  cursor: pointer;
  user-select: none;
  position: relative;
  transition: background-color 0.1s;
}
/* Square colors — pure CSS checkerboard via :nth-child */
#board .sq { background: #b58863; }
#board .sq:nth-child(16n+1), #board .sq:nth-child(16n+3),
#board .sq:nth-child(16n+5), #board .sq:nth-child(16n+7),
#board .sq:nth-child(16n+10), #board .sq:nth-child(16n+12),
#board .sq:nth-child(16n+14), #board .sq:nth-child(16n+16) {
  background: #f0d9b5;
}
/* Piece symbols — CSS content driven by data-piece attribute */
[data-piece="wK"]::before { content: '\2654'; }
[data-piece="wQ"]::before { content: '\2655'; }
[data-piece="wR"]::before { content: '\2656'; }
[data-piece="wB"]::before { content: '\2657'; }
[data-piece="wN"]::before { content: '\2658'; }
[data-piece="wP"]::before { content: '\2659'; }
[data-piece="bK"]::before { content: '\265A'; }
[data-piece="bQ"]::before { content: '\265B'; }
[data-piece="bR"]::before { content: '\265C'; }
[data-piece="bB"]::before { content: '\265D'; }
[data-piece="bN"]::before { content: '\265E'; }
[data-piece="bP"]::before { content: '\265F'; }
/* White pieces: white fill, dark outline */
.sq[data-piece^="w"]::before {
  color: #fff;
  text-shadow:
    -1px -1px 0 #333, 1px -1px 0 #333,
    -1px  1px 0 #333, 1px  1px 0 #333,
     0   -1px 0 #333, 0    1px 0 #333,
    -1px  0   0 #333, 1px  0   0 #333;
}
/* Black pieces: dark fill, light outline */
.sq[data-piece^="b"]::before {
  color: #1a1a1a;
  text-shadow:
    -1px -1px 0 rgba(255,255,255,0.6), 1px -1px 0 rgba(255,255,255,0.6),
    -1px  1px 0 rgba(255,255,255,0.6), 1px  1px 0 rgba(255,255,255,0.6),
     0   -1px 0 rgba(255,255,255,0.6), 0    1px 0 rgba(255,255,255,0.6),
    -1px  0   0 rgba(255,255,255,0.6), 1px  0   0 rgba(255,255,255,0.6);
}
/* Turn-aware cursors */
#game[data-turn="w"] .sq[data-piece^="w"] { cursor: pointer; }
#game[data-turn="w"] .sq:not([data-piece^="w"]) { cursor: default; }
/* Highlights */
#board .sq.selected { background: #f6f669 !important; }
#board .sq.last-move { background: #aac8e8 !important; }
/* Check highlight — driven by data-in-check on #game */
#game[data-in-check="w"] #board .sq[data-piece="wK"] { background: #ff6b6b !important; }
#game[data-in-check="b"] #board .sq[data-piece="bK"] { background: #ff6b6b !important; }
#board .sq:hover:not(.selected) {
  filter: brightness(1.1);
}
/* Off-screen candidates */
#candidates {
  position: absolute;
  left: -9999px;
  top: -9999px;
}
/* Info panel */
#info-panel {
  width: 240px;
  background: #16213e;
  border-radius: 8px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
#info-panel h2 {
  font-size: 18px;
  color: #e94560;
  text-align: center;
}
#status {
  padding: 10px;
  background: #0f3460;
  border-radius: 6px;
  text-align: center;
  font-weight: bold;
  min-height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#move-list {
  flex: 1;
  max-height: 340px;
  overflow-y: auto;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.6;
  padding: 8px;
  background: #0a0a1a;
  border-radius: 6px;
}
.move-pair {
  display: flex;
  gap: 8px;
}
.move-number { color: #666; min-width: 28px; text-align: right; }
.move-san { min-width: 60px; }
.move-san.white { color: #ddd; }
.move-san.black { color: #aaa; }
#new-game {
  padding: 10px;
  background: #e94560;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.2s;
}
#new-game:hover { background: #c73550; }
/* Thinking indicator */
#status.thinking::after {
  content: '';
  display: inline-block;
  width: 12px;
  height: 12px;
  border: 2px solid #e94560;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-left: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* Promotion dialog */
#promo-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  justify-content: center;
  align-items: center;
}
#promo-overlay.active { display: flex; }
#promo-dialog {
  background: #16213e;
  border-radius: 12px;
  padding: 16px;
  display: flex;
  gap: 8px;
}
#promo-dialog .promo-choice {
  font-size: 48px;
  width: 64px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f0d9b5;
  border-radius: 8px;
  cursor: pointer;
  border: 3px solid transparent;
  transition: border-color 0.1s, transform 0.1s;
}
#promo-dialog .promo-choice:hover {
  border-color: #e94560;
  transform: scale(1.1);
}
</style>
</head>

  <div id="info-panel">
    <h2>CSS Chess Engine</h2>
    <div id="status">Your turn (White)</div>

    <button id="new-game">New Game</button>

  <div id="promo-dialog"></div>

<script>
'use strict';

// ── Cached DOM references ──
const game = document.getElementById('game');
const board = document.getElementById('board');
const sqElements = new Map();
for (const el of board.querySelectorAll('.sq')) sqElements.set(el.dataset.sq, el);
const candidateEls = document.querySelectorAll('#candidates .move');

// ── UI State ──
let selectedSquare = null;
let currentLegalMoves = [];
let moveHistory = [];
let gameOver = false;

// ── resetBoard(fen) ── Parse FEN → set DOM attributes directly
function resetBoard(fen) {
  const files = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];
  const parts = fen.split(' ');
  const rows = parts[0].split('/');

  for (let rankIdx = 0; rankIdx < 8; rankIdx++) {
    const rank = 8 - rankIdx;
    let fileIdx = 0;
    for (const ch of rows[rankIdx]) {
      if (ch >= '1' && ch <= '8') {
        for (let i = 0; i < parseInt(ch); i++) {
          sqElements.get(files[fileIdx] + rank).dataset.piece = 'empty';
          fileIdx++;
        }
      } else {
        const color = ch === ch.toUpperCase() ? 'w' : 'b';
        sqElements.get(files[fileIdx] + rank).dataset.piece = color + ch.toUpperCase();
        fileIdx++;
      }
    }
  }

  game.dataset.turn = parts[1] || 'w';
  const castling = parts[2] || '-';
  game.setAttribute('data-castle-wk', castling.includes('K') ? '1' : '0');
  game.setAttribute('data-castle-wq', castling.includes('Q') ? '1' : '0');
  game.setAttribute('data-castle-bk', castling.includes('k') ? '1' : '0');
  game.setAttribute('data-castle-bq', castling.includes('q') ? '1' : '0');
  game.dataset.ep = (parts[3] && parts[3] !== '-') ? parts[3] : 'none';
  game.removeAttribute('data-in-check');

}

// ── applyMove(move) ── Directly mutate DOM attributes
function applyMove(move) {
  const fromEl = sqElements.get(move.from);
  const toEl = sqElements.get(move.to);
  const movingPiece = fromEl.dataset.piece;
  const pieceType = movingPiece[1];
  const color = movingPiece[0];

  // En passant capture
  if (move.ep) {
    sqElements.get(move.to[0] + move.from[1]).dataset.piece = 'empty';
  }

  // Castling rook
  if (move.castle) {
    let rookFrom, rookTo;
    if (move.castle === 'wk') { rookFrom = 'h1'; rookTo = 'f1'; }
    else if (move.castle === 'wq') { rookFrom = 'a1'; rookTo = 'd1'; }
    else if (move.castle === 'bk') { rookFrom = 'h8'; rookTo = 'f8'; }
    else if (move.castle === 'bq') { rookFrom = 'a8'; rookTo = 'd8'; }
    sqElements.get(rookTo).dataset.piece = sqElements.get(rookFrom).dataset.piece;
    sqElements.get(rookFrom).dataset.piece = 'empty';
  }

  // Move piece (with promotion)
  toEl.dataset.piece = move.promotion ? color + move.promotion.toUpperCase() : movingPiece;
  fromEl.dataset.piece = 'empty';

  // Update castling rights
  if (pieceType === 'K') {
    if (color === 'w') { game.setAttribute('data-castle-wk', '0'); game.setAttribute('data-castle-wq', '0'); }
    else { game.setAttribute('data-castle-bk', '0'); game.setAttribute('data-castle-bq', '0'); }
  }
  if (pieceType === 'R') {
    if (move.from === 'a1') game.setAttribute('data-castle-wq', '0');
    if (move.from === 'h1') game.setAttribute('data-castle-wk', '0');
    if (move.from === 'a8') game.setAttribute('data-castle-bq', '0');
    if (move.from === 'h8') game.setAttribute('data-castle-bk', '0');
  }
  if (move.to === 'a1') game.setAttribute('data-castle-wq', '0');
  if (move.to === 'h1') game.setAttribute('data-castle-wk', '0');
  if (move.to === 'a8') game.setAttribute('data-castle-bq', '0');
  if (move.to === 'h8') game.setAttribute('data-castle-bk', '0');

  // En passant square
  if (pieceType === 'P' && Math.abs(parseInt(move.to[1]) - parseInt(move.from[1])) === 2) {
    game.dataset.ep = move.from[0] + (color === 'w' ? '3' : '6');
  } else {
    game.dataset.ep = 'none';
  }

  // Switch turn
  game.dataset.turn = color === 'w' ? 'b' : 'w';

}

// ── getLegalMoves() ── Read CSS computed styles, no arguments needed
function getLegalMoves() {
  game.offsetHeight; // force style recalc

  const moves = [];
  const turn = game.dataset.turn;

  for (const el of candidateEls) {
    const style = getComputedStyle(el);
    if (style.getPropertyValue('--pseudo-legal').trim() !== '1') continue;
    if (style.getPropertyValue('--illegal').trim() === '1') continue;

    const from = el.dataset.from;
    const to = el.dataset.to;
    const fromEl = sqElements.get(from);
    const toEl = sqElements.get(to);

    const move = { from, to };
    if (el.dataset.promotion) move.promotion = el.dataset.promotion;
    if (el.dataset.castle) move.castle = el.dataset.castle;
    if (el.dataset.ep === 'true') move.ep = true;

    move.score = parseInt(style.order, 10) || 0;
    move.piece = fromEl.dataset.piece;
    move.pieceType = move.piece[1].toLowerCase();
    const toPiece = toEl.dataset.piece;
    if (toPiece !== 'empty') {
      move.captured = toPiece;
      move.capturedType = toPiece[1].toLowerCase();
    }
    if (move.ep) {
      move.captured = (turn === 'w' ? 'bP' : 'wP');
      move.capturedType = 'p';
    }
    moves.push(move);
  }
  return moves;
}

// ── isInCheck() ── Read CSS custom property from #board
function isInCheck() {
  game.offsetHeight; // force style recalc
  const checkVar = game.dataset.turn === 'w' ? '--wk-in-check' : '--bk-in-check';
  return getComputedStyle(board).getPropertyValue(checkVar).trim() === '1';
}

// ── toSan(move, legalMoves) ── Pure notation conversion, no +/# suffixes
function toSan(move, legalMoves) {
  if (move.castle === 'wk' || move.castle === 'bk') return 'O-O';
  if (move.castle === 'wq' || move.castle === 'bq') return 'O-O-O';

  const pieceType = move.piece[1];
  let san = '';

  if (pieceType === 'P') {
    if (move.captured) san += move.from[0] + 'x';
    san += move.to;
    if (move.promotion) san += '=' + move.promotion.toUpperCase();
  } else {
    san += pieceType;
    // Disambiguation
    const ambiguous = legalMoves.filter(m =>
      m.piece === move.piece && m.to === move.to && m.from !== move.from && !m.promotion
    );
    if (ambiguous.length > 0) {
      const sameFile = ambiguous.some(m => m.from[0] === move.from[0]);
      const sameRank = ambiguous.some(m => m.from[1] === move.from[1]);
      if (!sameFile) san += move.from[0];
      else if (!sameRank) san += move.from[1];
      else san += move.from;
    }
    if (move.captured) san += 'x';
    san += move.to;
  }

  return san;
}

// ── init() ──
function init() {
  selectedSquare = null;
  currentLegalMoves = [];
  moveHistory = [];
  gameOver = false;

  resetBoard('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1');

  document.getElementById('move-list').innerHTML = '';
  setStatus('Your turn (White)');
}

// ── onBoardClick(e) ──
function onBoardClick(e) {
  if (gameOver || game.dataset.turn !== 'w') return;

  const sqEl = e.target.closest('.sq');
  if (!sqEl) return;
  const sq = sqEl.dataset.sq;
  const piece = sqEl.dataset.piece;

  if (selectedSquare) {
    const move = currentLegalMoves.find(m => m.from === selectedSquare && m.to === sq);
    if (move) {
      if (move.pieceType === 'p' && (sq[1] === '8' || sq[1] === '1')) {
        showPromotionDialog(sq, selectedSquare);
        return;
      }
      playMove(move);
      return;
    }
    if (piece !== 'empty' && piece[0] === game.dataset.turn) {
      selectSquare(sq);
      return;
    }
    clearSelection();
    return;
  }

  if (piece !== 'empty' && piece[0] === game.dataset.turn) {
    selectSquare(sq);
  }
}

// ── selectSquare(sq) ──
function selectSquare(sq) {
  clearSelection();
  selectedSquare = sq;

  currentLegalMoves = getLegalMoves();

  sqElements.get(sq).classList.add('selected');
}

// ── clearSelection() ──
function clearSelection() {
  selectedSquare = null;
  for (const el of sqElements.values()) {
    el.classList.remove('selected');
  }
}

// ── showPromotionDialog(toSq, fromSq) ──
function showPromotionDialog(toSq, fromSq) {
  const overlay = document.getElementById('promo-overlay');
  const dialog = document.getElementById('promo-dialog');
  const color = game.dataset.turn;
  const pieces = ['Q', 'R', 'B', 'N'];

  dialog.innerHTML = '';
  for (const p of pieces) {
    const btn = document.createElement('div');
    btn.className = 'promo-choice';
    btn.setAttribute('data-piece', color + p);
    btn.addEventListener('click', () => {
      overlay.classList.remove('active');
      const move = currentLegalMoves.find(m =>
        m.from === fromSq && m.to === toSq && m.promotion === p.toLowerCase()
      );
      if (move) playMove(move);
    });
    dialog.appendChild(btn);
  }
  overlay.classList.add('active');
}

// ── playMove(move) ──
function playMove(move) {
  clearSelection();

  const san = toSan(move, currentLegalMoves);

  applyMove(move);

  moveHistory.push({ san, from: move.from, to: move.to });

  updateBoard(move);
  updateMoveList();

  if (checkGameEnd()) return;

  setStatus('Engine thinking...', true);
  setTimeout(() => engineMove(), 50);
}

// ── engineMove() ──
function engineMove() {
  if (gameOver) return;

  const moves = getLegalMoves();
  if (moves.length === 0) {
    checkGameEnd();
    return;
  }

  // CSS z-index argmax: elementFromPoint returns the highest-scored legal move
  const el = document.elementFromPoint(0, 0);
  const bf = el?.dataset.from;
  const bt = el?.dataset.to;
  const bp = el?.dataset.promotion || '';
  const bestMove = moves.find(m => m.from === bf && m.to === bt && (m.promotion || '') === bp) || moves[0];

  const san = toSan(bestMove, moves);

  applyMove(bestMove);

  moveHistory.push({ san, from: bestMove.from, to: bestMove.to });

  updateBoard(bestMove);
  updateMoveList();

  if (checkGameEnd()) return;

  setStatus('Your turn (White)');
}

// ── updateBoard(lastMove) ──
function updateBoard(lastMove) {
  for (const el of sqElements.values()) {
    el.classList.remove('last-move');
  }

  if (lastMove) {
    sqElements.get(lastMove.from).classList.add('last-move');
    sqElements.get(lastMove.to).classList.add('last-move');
  }

  // CSS check highlighting via data-in-check
  if (isInCheck()) {
    game.dataset.inCheck = game.dataset.turn;
  } else {
    game.removeAttribute('data-in-check');
  }
}

// ── checkGameEnd() ──
function checkGameEnd() {
  const moves = getLegalMoves();
  if (moves.length > 0) return false;

  gameOver = true;
  if (isInCheck()) {
    const winner = game.dataset.turn === 'w' ? 'Black' : 'White';
    setStatus('Checkmate! ' + winner + ' wins!');
  } else {
    setStatus('Stalemate! Draw.');
  }
  return true;
}

// ── updateMoveList() ──
function updateMoveList() {
  const container = document.getElementById('move-list');
  container.innerHTML = '';
  for (let i = 0; i < moveHistory.length; i += 2) {
    const moveNum = Math.floor(i / 2) + 1;
    const div = document.createElement('div');
    div.className = 'move-pair';
    div.innerHTML = '<span class="move-number">' + moveNum + '.</span>'
      + '<span class="move-san white">' + moveHistory[i].san + '</span>'
      + (moveHistory[i + 1] ? '<span class="move-san black">' + moveHistory[i + 1].san + '</span>' : '');
    container.appendChild(div);
  }
  container.scrollTop = container.scrollHeight;
}

// ── setStatus(text, thinking) ──
function setStatus(text, thinking) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = thinking ? 'thinking' : '';
}

// ── Init ──
board.addEventListener('click', onBoardClick);
document.getElementById('new-game').addEventListener('click', init);
init();
</script>
